<!DOCTYPE html>
<html>
<head>
<title>Rainbow Hello World</title>
<style>
body {
  background-color: #111;
  overflow: hidden;
  margin: 0;
}

#rainbow {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.rainbow-bar {
  width: 10px;
  height: 100%;
  background: repeating-linear-gradient(
    45deg,
    #F00,
    #F00 10px,
    #FF0,
    #FF0 10px,
    #FFF,
    #FFF 10px,
    #0F0,
    #0F0 10px,
    #0F0,
    #0F0 10px,
    #00F,
    #00F 10px,
    #000
  );
}

#hello-world {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 3em;
  color: #fff;
  animation: moveHello 5s linear infinite;
}

@keyframes moveHello {
  0% {
    left: 50%;
  }
  100% {
    left: 95%;
  }
}

#gold-pot {
  position: absolute;
  bottom: 0;
  left: 90%;
  width: 80px;
  height: 100px;
  background-color: #FFD700;
  border-radius: 50%;
  box-shadow: 0 0 20px #FFD700;
}
</style>
</head>
<body>

  <div id="rainbow">
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
    <div class="rainbow-bar"></div>
  </div>

  <div id="hello-world">Hello World</div>

  <div id="gold-pot"></div>

  <script>
    // No JavaScript needed for basic animation - all CSS handled.
  </script>

</body>
</html>
